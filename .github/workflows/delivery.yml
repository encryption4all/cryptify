name: Delivery

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  release-plz:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      is_release: ${{ steps.tag.outputs.is_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Detect release tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_release=$([[ -n "${TAG}" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  release-plz-pr:
    needs: release-plz
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-amd64:
    runs-on: ubuntu-latest
    needs: [release-plz]
    if: always() && (needs.release-plz.result == 'success' || needs.release-plz.result == 'skipped')
    permissions:
      packages: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select build profile
        id: config
        run: |
          if [[ "${{ needs.release-plz.outputs.is_release }}" == "true" ]]; then
            echo "profile=release" >> "$GITHUB_OUTPUT"
          else
            echo "profile=edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository }}:build-${{ github.run_id }}-amd64
          build-args: CARGO_PROFILE=${{ steps.config.outputs.profile }}
          cache-from: type=gha,scope=build-amd64
          cache-to: type=gha,mode=max,scope=build-amd64

      - name: Scan image
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        id: scan
        with:
          image: ghcr.io/${{ github.repository }}:build-${{ github.run_id }}-amd64
          only-fixed: true
          fail-build: true
          severity-cutoff: critical
          output-format: sarif

      - name: Upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4
        if: ${{ !cancelled() }}
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: [release-plz]
    if: always() && (needs.release-plz.result == 'success' || needs.release-plz.result == 'skipped')
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select build profile
        id: config
        run: |
          if [[ "${{ needs.release-plz.outputs.is_release }}" == "true" ]]; then
            echo "profile=release" >> "$GITHUB_OUTPUT"
          else
            echo "profile=edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository }}:build-${{ github.run_id }}-arm64
          build-args: CARGO_PROFILE=${{ steps.config.outputs.profile }}
          cache-from: type=gha,scope=build-arm64
          cache-to: type=gha,mode=max,scope=build-arm64

  merge:
    runs-on: ubuntu-latest
    needs: [release-plz, build-amd64, build-arm64]
    if: always() && (needs.build-amd64.result == 'success' && needs.build-arm64.result == 'success')
    permissions:
      packages: write
    steps:
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-plz.outputs.tag }},enable=${{ needs.release-plz.outputs.is_release == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-plz.outputs.tag }},enable=${{ needs.release-plz.outputs.is_release == 'true' }}
            type=edge,enable=${{ needs.release-plz.outputs.is_release != 'true' }}
            type=ref,event=pr
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Combine the two platform-specific images into a single multi-arch manifest.
      # DOCKER_METADATA_OUTPUT_JSON is set automatically by docker/metadata-action.
      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "ghcr.io/${{ github.repository }}@${{ needs.build-amd64.outputs.digest }}" \
            "ghcr.io/${{ github.repository }}@${{ needs.build-arm64.outputs.digest }}"
